# Mobile Command Dashboard — Touch-Optimized House Dodson Control
# Bubble Card bottom nav + pop-ups for mobile experience

title: "📱 Mobile Command"
theme: dune_theme

views:
  # ================================================================
  # HOME VIEW
  # ================================================================
  - title: "Home"
    icon: mdi:home
    path: home
    badges: []
    cards:
      # Header
      - type: markdown
        content: "## 🏜️ House Dodson"

      # People
      - type: glance
        show_state: true
        state_color: true
        entities:
          - entity: person.tori_myers
            name: Tori
          - entity: person.bennett
            name: Bennett
          - entity: input_select.home_state
            name: Home State
            icon: mdi:home-account

      # Weather button
      - type: custom:bubble-card
        card_type: button
        entity: weather.forecast_home
        name: Weather & Forecast
        icon: mdi:weather-partly-cloudy
        button_action:
          tap_action:
            action: navigate
            navigation_path: "#weather"

      # Quick toggles
      - type: horizontal-stack
        cards:
          - type: button
            entity: input_boolean.notification_system_enabled
            name: "Notifications"
            icon: mdi:bell
            tap_action:
              action: toggle
          - type: button
            entity: input_boolean.vacation_mode
            name: "Away Mode"
            icon: mdi:airplane
            tap_action:
              action: toggle
          - type: button
            entity: input_boolean.nap_mode
            name: "Modes"
            icon: mdi:tune
            tap_action:
              action: navigate
              navigation_path: "#modes-mobile"

      # Quick access — all lights on/off + goodnight
      - type: horizontal-stack
        cards:
          - type: button
            name: "All On"
            icon: mdi:lightbulb-on
            tap_action:
              action: call-service
              service: homeassistant.turn_on
              target:
                entity_id:
                  - light.indoor_lights
                  - switch.tp_link_power_strip_173b_couch_lamp
                  - switch.tp_link_power_strip_1446_lamp_by_door
          - type: button
            name: "All Off"
            icon: mdi:lightbulb-off
            tap_action:
              action: call-service
              service: homeassistant.turn_off
              target:
                entity_id:
                  - light.indoor_lights
                  - switch.tp_link_power_strip_173b_couch_lamp
                  - switch.tp_link_power_strip_1446_lamp_by_door
          - type: button
            entity: script.goodnight_routine
            name: "Goodnight"
            icon: mdi:weather-night
            tap_action:
              action: call-service
              service: script.turn_on
              target:
                entity_id: script.goodnight_routine

      # Lock status
      - type: entities
        state_color: true
        entities:
          - entity: lock.front_door
            name: "Front Door"
            icon: mdi:door-closed-lock
          - entity: lock.back_door
            name: "Back Door"
            icon: mdi:door-closed-lock

      # Bottom nav — numbered key syntax required for horizontal-buttons-stack
      - type: custom:bubble-card
        card_type: horizontal-buttons-stack
        1_name: Home
        1_icon: mdi:home
        1_link: /lovelace-mobile-command/home
        2_name: Lights
        2_icon: mdi:lightbulb-group
        2_link: "#lights"
        3_name: Shades
        3_icon: mdi:blinds
        3_link: "#shades-mobile"
        4_name: Security
        4_icon: mdi:shield-home
        4_link: "#security-mobile"
        5_name: System
        5_icon: mdi:cog
        5_link: "#system"

      # ================================================================
      # MOBILE POP-UPS
      # vertical-stack: pop-up card first, content cards after
      # ================================================================

      # --- Modes ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#modes-mobile"
            name: Modes
            icon: mdi:tune
          - type: entities
            title: Rest & Comfort
            state_color: true
            entities:
              - entity: input_boolean.nap_mode
                name: Nap Mode
                icon: mdi:sleep
              - entity: input_boolean.reading_mode_living_room
                name: Reading — Living Room
                icon: mdi:book-open-variant
              - entity: input_boolean.reading_mode_bedroom
                name: Reading — Bedroom
                icon: mdi:book-open-page-variant
          - type: entities
            title: Activity
            state_color: true
            entities:
              - entity: input_boolean.cooking_mode
                name: Cooking Mode
                icon: mdi:chef-hat
              - entity: input_boolean.movie_mode
                name: Movie Mode
                icon: mdi:television-play
          - type: entities
            title: Work & Focus
            state_color: true
            entities:
              - entity: input_boolean.focus_mode
                name: Focus Mode
                icon: mdi:brain
              - entity: input_boolean.do_not_disturb
                name: Do Not Disturb
                icon: mdi:bell-off
          - type: entities
            title: Social
            state_color: true
            entities:
              - entity: input_boolean.party_mode
                name: Party Mode
                icon: mdi:party-popper
              - entity: input_boolean.guest_mode
                name: Guest Mode
                icon: mdi:account-group
          - type: entities
            title: Home State
            state_color: true
            entities:
              - entity: input_boolean.vacation_mode
                name: Vacation Mode
                icon: mdi:airplane
              - entity: input_boolean.storm_mode
                name: Storm Mode
                icon: mdi:weather-lightning

      # --- Weather ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#weather"
            name: Weather & Forecast
            icon: mdi:weather-partly-cloudy
          - type: weather-forecast
            entity: weather.forecast_home
            show_forecast: true
            forecast_type: daily
          - type: entities
            title: Sun Schedule
            entities:
              - entity: sensor.sun_next_rising
                name: Next Sunrise
                icon: mdi:weather-sunset-up
              - entity: sensor.sun_next_setting
                name: Next Sunset
                icon: mdi:weather-sunset-down
              - entity: sensor.sun_next_dawn
                name: Next Dawn
              - entity: sensor.sun_next_dusk
                name: Next Dusk
          - type: entities
            title: Room Temperatures
            entities:
              - entity: sensor.bedroom_temperature
                name: Bedroom
              - entity: sensor.kitchen_temperature
                name: Kitchen
              - entity: sensor.living_room_temperature
                name: Living Room
              - entity: sensor.office_temperature
                name: Office

      # --- Lights ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#lights"
            name: Lighting Controls
            icon: mdi:lightbulb-group
          - type: light
            entity: light.kitchen_over_oven
            name: Kitchen Over Oven
          - type: light
            entity: light.kitchen_over_sink
            name: Kitchen Over Sink
          - type: light
            entity: light.ledvance_a19_rgbw_light
            name: Office Right
          - type: light
            entity: light.ledvance_a19_rgbw_light_2
            name: Office Upper
          - type: light
            entity: light.ledvance_a19_rgbw_light_3
            name: Office Left
          - type: entities
            title: Switches
            state_color: true
            entities:
              - entity: switch.tp_link_power_strip_173b_couch_lamp
                name: Couch Lamp
              - entity: switch.tp_link_power_strip_1446_lamp_by_door
                name: Door Lamp
          - type: light
            entity: light.bedroom_tori_light
            name: Bedroom Lamp
          - type: button
            name: All Lights Off
            icon: mdi:lightbulb-off
            tap_action:
              action: call-service
              service: homeassistant.turn_off
              target:
                entity_id:
                  - light.indoor_lights
                  - switch.tp_link_power_strip_173b_couch_lamp
                  - switch.tp_link_power_strip_1446_lamp_by_door

      # --- Security ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#security-mobile"
            name: Security
            icon: mdi:shield-home
          - type: alarm-panel
            entity: alarm_control_panel.alarm
            name: Ring Alarm
            states:
              - arm_home
              - arm_away
          - type: entities
            title: Door Locks
            state_color: true
            entities:
              - lock.front_door
              - lock.back_door
          - type: entities
            title: Water Leak
            state_color: true
            entities:
              - entity: binary_sensor.lumi_lumi_sensor_wleak_aq1_2
                name: Water Heater
                icon: mdi:water-alert
              - entity: binary_sensor.lumi_lumi_sensor_wleak_aq1_3
                name: Laundry Room
                icon: mdi:water-alert

      # --- Shades ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#shades-mobile"
            name: Roller Shades
            icon: mdi:blinds
          - type: horizontal-stack
            cards:
              - type: button
                name: Open All
                icon: mdi:blinds-open
                tap_action:
                  action: call-service
                  service: cover.open_cover
                  target:
                    entity_id:
                      - cover.living_room_left_roller_shade_cover
                      - cover.right_living_room_roller_shade_cover
                      - cover.office_left_roller_shade_cover
                      - cover.office_right_roller_shade_cover
              - type: button
                name: Close All
                icon: mdi:blinds
                tap_action:
                  action: call-service
                  service: cover.close_cover
                  target:
                    entity_id:
                      - cover.living_room_left_roller_shade_cover
                      - cover.right_living_room_roller_shade_cover
                      - cover.office_left_roller_shade_cover
                      - cover.office_right_roller_shade_cover
                      - cover.tori_roller_shade_cover
                      - cover.bennett_roller_shade_cover
          - type: entities
            title: Living Room
            entities:
              - entity: cover.living_room_left_roller_shade_cover
                name: Left
              - entity: cover.right_living_room_roller_shade_cover
                name: Right
          - type: entities
            title: Office
            entities:
              - entity: cover.office_left_roller_shade_cover
                name: Left
              - entity: cover.office_right_roller_shade_cover
                name: Right
          - type: entities
            title: Bedroom
            entities:
              - entity: cover.tori_roller_shade_cover
                name: Tori
              - entity: cover.bennett_roller_shade_cover
                name: Bennett

      # --- System ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#system"
            name: System
            icon: mdi:cog
          - type: entities
            title: Notifications
            state_color: true
            entities:
              - entity: input_boolean.notification_system_enabled
                name: Notifications Enabled
                icon: mdi:bell
              - entity: input_boolean.daily_reports_enabled
                name: Daily Reports
              - entity: input_boolean.emergency_alerts_enabled
                name: Emergency Alerts
                icon: mdi:alert
          - type: entities
            title: Automation Controls
            state_color: true
            entities:
              - entity: input_boolean.motion_lighting_enabled
                name: Motion Lighting
                icon: mdi:lightbulb-auto
              - entity: input_boolean.maintenance_mode
                name: Maintenance Mode
                icon: mdi:wrench
          - type: horizontal-stack
            cards:
              - type: button
                name: Dune Theme
                icon: mdi:palette
                tap_action:
                  action: call-service
                  service: frontend.set_theme
                  data:
                    name: dune_theme
              - type: button
                name: Default Theme
                icon: mdi:palette-outline
                tap_action:
                  action: call-service
                  service: frontend.set_theme
                  data:
                    name: default
          - type: button
            name: Primary Dashboard
            icon: mdi:home
            tap_action:
              action: navigate
              navigation_path: /lovelace/home
