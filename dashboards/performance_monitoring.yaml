# System Monitoring Dashboard
# Real-time status, maintenance tools, and battery monitoring

title: "System Monitoring"
theme: dune_theme

views:
  # ─── System Status & Maintenance ────────────────────────────────────────────
  - title: "System"
    icon: mdi:cog
    path: system
    badges: []
    cards:

      # Updates — auto-shows all update entities, hides when nothing is pending
      - type: entity-filter
        entities:
          - domain: update
        state_filter:
          - "on"
        show_empty: false
        card:
          type: entities
          title: "Updates Available"

      # Key Device Status
      - type: horizontal-stack
        cards:
          - type: entity
            entity: lock.front_door
            name: "Front Door"
            icon: mdi:door-closed-lock
          - type: entity
            entity: lock.back_door
            name: "Back Door"
            icon: mdi:door-closed-lock
          - type: entity
            entity: alarm_control_panel.alarm
            name: "Ring Alarm"
            icon: mdi:shield-home

      # HA Maintenance
      - type: entities
        title: "Maintenance"
        entities:
          - type: button
            name: "Validate Config"
            action_name: "Check"
            tap_action:
              action: call-service
              service: homeassistant.check_config
          - type: button
            name: "Reload Automations"
            action_name: "Reload"
            tap_action:
              action: call-service
              service: automation.reload
          - type: button
            name: "Reload Scripts"
            action_name: "Reload"
            tap_action:
              action: call-service
              service: script.reload
          - type: button
            name: "Restart Home Assistant"
            action_name: "Restart"
            tap_action:
              action: call-service
              service: homeassistant.restart

      # PowerCalc
      - type: entities
        title: "PowerCalc"
        entities:
          - type: button
            name: "Update Power Library"
            action_name: "Update"
            tap_action:
              action: call-service
              service: powercalc.update_library
          - type: button
            name: "Reload PowerCalc"
            action_name: "Reload"
            tap_action:
              action: call-service
              service: powercalc.reload

  # ─── Battery Monitoring ──────────────────────────────────────────────────────
  - title: "Batteries"
    icon: mdi:battery-heart
    path: batteries
    badges: []
    cards:

      # Auto-sorted overview — low batteries rise to the top
      - type: custom:battery-state-card
        title: "All Devices — Sorted by Level"
        sort_by_level: "asc"
        filter:
          include:
            - name: entity_id
              value: "sensor.*_battery"

      # Ring Alarm System
      - type: entities
        title: "Ring Alarm System"
        state_color: true
        entities:
          - entity: sensor.base_station_battery
            name: "Base Station"
          - entity: sensor.keypad_battery
            name: "Keypad"
          - entity: sensor.front_door_battery
            name: "Front Door Sensor"
          - entity: sensor.back_door_battery
            name: "Back Door Sensor"

      # Window Sensors
      - type: entities
        title: "Window Sensors"
        state_color: true
        entities:
          - entity: sensor.back_window_battery
            name: "Kitchen Back Window"
          - entity: sensor.left_window_battery
            name: "Office Left Window"
          - entity: sensor.right_window_battery
            name: "Office Right Window"
          - entity: sensor.left_window_battery_2
            name: "Living Room Left Window"
          - entity: sensor.right_window_battery_2
            name: "Living Room Right Window"
          - entity: sensor.tori_window_battery
            name: "Tori Bedroom Window"
          - entity: sensor.bennett_window_battery
            name: "Bennett Bedroom Window"
          - entity: sensor.window_battery
            name: "Atlas Room Window"
          - entity: sensor.mailbox_sensor_battery
            name: "Mailbox Sensor"

      # Motion Sensors
      - type: entities
        title: "Motion Sensors"
        state_color: true
        entities:
          - entity: sensor.kitchen_battery
            name: "Kitchen"
          - entity: sensor.bedroom_battery
            name: "Bedroom"
          - entity: sensor.living_room_motion_sensor_battery
            name: "Living Room"
          - entity: sensor.office_motion_sensor_battery
            name: "Office"
          - entity: sensor.ikea_of_sweden_tradfri_motion_sensor_battery
            name: "IKEA Motion 1"
          - entity: sensor.ikea_of_sweden_tradfri_motion_sensor_battery_2
            name: "IKEA Motion 2"

      # Roller Shades
      - type: entities
        title: "Roller Shades"
        state_color: true
        entities:
          - entity: sensor.bennett_roller_shade_battery
            name: "Bennett's Shade"
          - entity: sensor.tori_roller_shade_battery
            name: "Tori's Shade"
          - entity: sensor.left_living_room_roller_shade_battery
            name: "Living Room Left"
          - entity: sensor.right_living_room_roller_shade_battery
            name: "Living Room Right"
          - entity: sensor.left_office_roller_blind_battery
            name: "Office Left"
          - entity: sensor.right_office_roller_blind_battery
            name: "Office Right"
          - entity: sensor.bedroom_roller_shade_remote_battery
            name: "Bedroom Remote"

      # Pet Trackers
      - type: entities
        title: "Pet Trackers"
        state_color: true
        entities:
          - entity: sensor.atlas_tracker_battery
            name: "Atlas"
          - entity: sensor.ellie_tracker_battery
            name: "Ellie"
          - entity: sensor.shadow_tracker_battery
            name: "Shadow"
          - entity: sensor.lance_tracker_battery
            name: "Lance"

      # Remotes & Other
      - type: entities
        title: "Remotes & Other"
        state_color: true
        entities:
          - entity: sensor.ikea_of_sweden_remote_control_n2_battery
            name: "IKEA Remote 1"
          - entity: sensor.ikea_of_sweden_remote_control_n2_battery_2
            name: "IKEA Remote 2"
          - entity: sensor.dishwasher_vibration_battery
            name: "Dishwasher Sensor"
