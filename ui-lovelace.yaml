---
# House Dodson Command — Primary Dashboard
# Bubble Card single-view layout with pop-ups and bottom nav
# Backup: ui-lovelace.yaml.pre-bubble-backup

title: Home
views:
  - title: Home
    path: home
    icon: mdi:home
    cards:

      # ================================================================
      # HEADER
      # ================================================================
      - type: markdown
        content: "## 🏜️ House Dodson"

      # ================================================================
      # PEOPLE
      # ================================================================
      - type: glance
        show_state: true
        state_color: true
        entities:
          - entity: person.tori_myers
            name: Tori
          - entity: person.bennett
            name: Bennett

      # ================================================================
      # WEATHER SUMMARY BUTTON
      # button_action wraps tap_action for bubble-card buttons
      # ================================================================
      - type: custom:bubble-card
        card_type: button
        entity: weather.forecast_home
        name: Weather & Forecast
        icon: mdi:weather-partly-cloudy
        button_action:
          tap_action:
            action: navigate
            navigation_path: "#weather"

      # ================================================================
      # QUICK ACTIONS
      # ================================================================
      - type: custom:bubble-card
        card_type: separator
        name: Quick Actions

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:bubble-card
            card_type: button
            entity: script.goodnight_routine
            name: Goodnight
            icon: mdi:weather-night
            button_action:
              tap_action:
                action: call-service
                service: script.goodnight_routine
          - type: custom:bubble-card
            card_type: button
            entity: lock.front_door
            name: Lock All
            icon: mdi:lock
            button_action:
              tap_action:
                action: call-service
                service: lock.lock
                service_data:
                  entity_id:
                    - lock.front_door
                    - lock.back_door
          - type: custom:bubble-card
            card_type: button
            entity: light.indoor_lights
            name: Lights On
            icon: mdi:lightbulb-on
            button_action:
              tap_action:
                action: call-service
                service: homeassistant.turn_on
                target:
                  entity_id:
                    - light.indoor_lights
                    - switch.tp_link_power_strip_173b_couch_lamp
                    - switch.tp_link_power_strip_1446_lamp_by_door
          - type: custom:bubble-card
            card_type: button
            entity: light.indoor_lights
            name: Lights Off
            icon: mdi:lightbulb-off
            button_action:
              tap_action:
                action: call-service
                service: homeassistant.turn_off
                target:
                  entity_id:
                    - light.indoor_lights
                    - switch.tp_link_power_strip_173b_couch_lamp
                    - switch.tp_link_power_strip_1446_lamp_by_door

      # ================================================================
      # ROOM GRID
      # ================================================================
      - type: custom:bubble-card
        card_type: separator
        name: Rooms

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:bubble-card
            card_type: button
            entity: light.kitchen_over_oven
            name: Kitchen
            icon: mdi:chef-hat
            button_action:
              tap_action:
                action: navigate
                navigation_path: "#kitchen"
          - type: custom:bubble-card
            card_type: button
            entity: switch.tp_link_power_strip_173b_couch_lamp
            name: Living Room
            icon: mdi:sofa
            button_action:
              tap_action:
                action: navigate
                navigation_path: "#living-room"
          - type: custom:bubble-card
            card_type: button
            entity: light.ledvance_a19_rgbw_light
            name: Office
            icon: mdi:desk
            button_action:
              tap_action:
                action: navigate
                navigation_path: "#office"
          - type: custom:bubble-card
            card_type: button
            entity: light.bedroom_tori_light
            name: Bedroom
            icon: mdi:bed
            button_action:
              tap_action:
                action: navigate
                navigation_path: "#bedroom"
          - type: custom:bubble-card
            card_type: button
            entity: light.dining_room_table_light_1
            name: Dining Room
            icon: mdi:table-chair
            button_action:
              tap_action:
                action: navigate
                navigation_path: "#dining-room"
          - type: custom:bubble-card
            card_type: button
            entity: alarm_control_panel.alarm
            name: Security
            icon: mdi:shield-home
            button_action:
              tap_action:
                action: navigate
                navigation_path: "#security"

      # ================================================================
      # SYSTEM & MORE
      # ================================================================
      - type: custom:bubble-card
        card_type: separator
        name: More

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:bubble-card
            card_type: button
            entity: input_boolean.notification_system_enabled
            name: System
            icon: mdi:cog
            button_action:
              tap_action:
                action: navigate
                navigation_path: "#system"
          - type: custom:bubble-card
            card_type: button
            entity: sensor.base_station_battery
            name: Batteries
            icon: mdi:battery-heart
            button_action:
              tap_action:
                action: navigate
                navigation_path: "#batteries"
          - type: custom:bubble-card
            card_type: button
            entity: input_boolean.nap_mode
            name: Modes
            icon: mdi:tune
            button_action:
              tap_action:
                action: navigate
                navigation_path: "#modes"
          - type: custom:bubble-card
            card_type: button
            entity: cover.living_room_left_roller_shade_cover
            name: Shades
            icon: mdi:blinds
            button_action:
              tap_action:
                action: navigate
                navigation_path: "#shades"

      # ================================================================
      # BOTTOM NAVIGATION BAR
      # horizontal-buttons-stack uses numbered keys: N_name, N_icon, N_link
      # ================================================================
      - type: custom:bubble-card
        card_type: horizontal-buttons-stack
        1_name: Home
        1_icon: mdi:home
        1_link: /lovelace/home
        2_name: Lights
        2_icon: mdi:lightbulb-group
        2_link: "#lights"
        3_name: Weather
        3_icon: mdi:weather-partly-cloudy
        3_link: "#weather"
        4_name: Security
        4_icon: mdi:shield-home
        4_link: "#security"
        5_name: Routines
        5_icon: mdi:robot
        5_link: "#routines"

      # ================================================================
      # POP-UPS
      # vertical-stack: bubble-card pop-up first, content cards after.
      # The pop-up converts the entire stack into a modal overlay.
      # ================================================================

      # --- Weather ---
      # --- Lights ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#lights"
            name: All Lights
            icon: mdi:lightbulb-group
          - type: light
            entity: light.kitchen_over_oven
            name: Kitchen Over Oven
          - type: light
            entity: light.kitchen_over_sink
            name: Kitchen Over Sink
          - type: light
            entity: light.ledvance_a19_rgbw_light
            name: Office Right
          - type: light
            entity: light.ledvance_a19_rgbw_light_2
            name: Office Upper
          - type: light
            entity: light.ledvance_a19_rgbw_light_3
            name: Office Left
          - type: light
            entity: light.bedroom_tori_light
            name: Bedroom
          - type: entities
            title: Switches
            state_color: true
            entities:
              - entity: switch.tp_link_power_strip_173b_couch_lamp
                name: Couch Lamp
              - entity: switch.tp_link_power_strip_1446_lamp_by_door
                name: Door Lamp
          - type: horizontal-stack
            cards:
              - type: button
                name: All On
                icon: mdi:lightbulb-on
                tap_action:
                  action: call-service
                  service: homeassistant.turn_on
                  target:
                    entity_id:
                      - light.indoor_lights
                      - switch.tp_link_power_strip_173b_couch_lamp
                      - switch.tp_link_power_strip_1446_lamp_by_door
              - type: button
                name: All Off
                icon: mdi:lightbulb-off
                tap_action:
                  action: call-service
                  service: homeassistant.turn_off
                  target:
                    entity_id:
                      - light.indoor_lights
                      - switch.tp_link_power_strip_173b_couch_lamp
                      - switch.tp_link_power_strip_1446_lamp_by_door

      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#weather"
            name: Weather & Forecast
            icon: mdi:weather-partly-cloudy
          - type: weather-forecast
            entity: weather.forecast_home
            show_forecast: true
            forecast_type: daily
          - type: entities
            title: Sun Schedule
            entities:
              - entity: sensor.sun_next_rising
                name: Next Sunrise
                icon: mdi:weather-sunset-up
              - entity: sensor.sun_next_setting
                name: Next Sunset
                icon: mdi:weather-sunset-down
              - entity: sensor.sun_next_dawn
                name: Next Dawn
              - entity: sensor.sun_next_dusk
                name: Next Dusk
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-entity-card
                entity: sensor.home_current_temperature
                name: Indoor Temp
                icon: mdi:thermometer
                layout: vertical
              - type: custom:mushroom-entity-card
                entity: sensor.home_current_humidity
                name: Humidity
                icon: mdi:water-percent
                layout: vertical
          - type: entities
            title: Room Temperatures
            entities:
              - entity: sensor.bedroom_temperature
                name: Bedroom
                icon: mdi:bed
              - entity: sensor.kitchen_temperature
                name: Kitchen
                icon: mdi:chef-hat
              - entity: sensor.living_room_temperature
                name: Living Room
                icon: mdi:sofa
              - entity: sensor.office_temperature
                name: Office
                icon: mdi:desk

      # --- Kitchen ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#kitchen"
            name: Kitchen
            icon: mdi:chef-hat
          - type: light
            entity: light.kitchen_over_oven
            name: Over Oven
          - type: light
            entity: light.kitchen_over_sink
            name: Over Sink
          - type: entities
            title: Sensors
            state_color: true
            entities:
              - entity: binary_sensor.kitchen_motion
                name: Motion
                icon: mdi:motion-sensor
              - entity: sensor.kitchen_temperature
                name: Temperature
                icon: mdi:thermometer

      # --- Living Room ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#living-room"
            name: Living Room
            icon: mdi:sofa
          - type: entities
            title: Lamps
            state_color: true
            entities:
              - entity: switch.tp_link_power_strip_173b_couch_lamp
                name: Couch Lamp
                icon: mdi:lamp
              - entity: switch.tp_link_power_strip_1446_lamp_by_door
                name: Door Lamp
                icon: mdi:lamp
          - type: entities
            title: Roller Shades
            entities:
              - cover.living_room_left_roller_shade_cover
              - cover.right_living_room_roller_shade_cover
          - type: entities
            title: Sensors
            state_color: true
            entities:
              - entity: binary_sensor.living_room_motion
                name: Motion
                icon: mdi:motion-sensor
              - entity: sensor.living_room_temperature
                name: Temperature
                icon: mdi:thermometer
              - entity: binary_sensor.left_window_2
                name: Left Window
                icon: mdi:window-closed
              - entity: binary_sensor.right_window_2
                name: Right Window
                icon: mdi:window-closed

      # --- Office ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#office"
            name: Office
            icon: mdi:desk
          - type: light
            entity: light.ledvance_a19_rgbw_light
            name: Right Light
          - type: light
            entity: light.ledvance_a19_rgbw_light_2
            name: Upper Light
          - type: light
            entity: light.ledvance_a19_rgbw_light_3
            name: Left Light
          - type: entities
            title: Roller Shades
            entities:
              - cover.office_left_roller_shade_cover
              - cover.office_right_roller_shade_cover
          - type: entities
            title: Sensors
            state_color: true
            entities:
              - entity: binary_sensor.office_motion
                name: Motion
                icon: mdi:motion-sensor
              - entity: sensor.office_temperature
                name: Temperature
                icon: mdi:thermometer
              - entity: binary_sensor.left_window
                name: Left Window
                icon: mdi:window-closed
              - entity: binary_sensor.right_window
                name: Right Window
                icon: mdi:window-closed

      # --- Bedroom ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#bedroom"
            name: Bedroom
            icon: mdi:bed
          - type: light
            entity: light.bedroom_tori_light
            name: Bedroom Lamp
          - type: entities
            title: Roller Shades
            entities:
              - cover.tori_roller_shade_cover
              - cover.bennett_roller_shade_cover
          - type: entities
            title: Sensors
            state_color: true
            entities:
              - entity: sensor.bedroom_temperature
                name: Temperature
                icon: mdi:thermometer
              - entity: binary_sensor.tori_window
                name: Tori's Window
                icon: mdi:window-closed
              - entity: binary_sensor.bennett_window
                name: Bennett's Window
                icon: mdi:window-closed

      # --- Dining Room ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#dining-room"
            name: Dining Room
            icon: mdi:table-chair
          - type: entities
            title: Chandelier
            show_header_toggle: true
            state_color: true
            entities:
              - light.dining_room_table_light_1
              - light.dining_room_table_light_2
              - light.ikea_of_sweden_tradfribulbe12wscandleopal450lm_light_3
              - light.ikea_of_sweden_tradfribulbe12wscandleopal450lm_light_4

      # --- Security ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#security"
            name: Security
            icon: mdi:shield-home
          - type: alarm-panel
            entity: alarm_control_panel.alarm
            name: Ring Alarm
            states:
              - arm_home
              - arm_away
          - type: entities
            title: Door Locks
            state_color: true
            entities:
              - lock.front_door
              - lock.back_door
          - type: horizontal-stack
            cards:
              - type: picture-entity
                entity: camera.front_770e
                name: Front
                camera_view: auto
              - type: picture-entity
                entity: camera.front_yard_9747
                name: Front Yard
                camera_view: auto
          - type: horizontal-stack
            cards:
              - type: picture-entity
                entity: camera.front_door_4ae9
                name: Front Door
                camera_view: auto
              - type: picture-entity
                entity: camera.backyard_f84a
                name: Backyard
                camera_view: auto
          - type: entities
            title: Door & Window Sensors
            state_color: true
            entities:
              - entity: binary_sensor.front_door
                name: Front Door
                icon: mdi:door
              - entity: binary_sensor.back_door
                name: Back Door
                icon: mdi:door
              - entity: binary_sensor.left_window
                name: Office Left Window
              - entity: binary_sensor.right_window
                name: Office Right Window
              - entity: binary_sensor.left_window_2
                name: Living Room Left Window
              - entity: binary_sensor.right_window_2
                name: Living Room Right Window
              - entity: binary_sensor.tori_window
                name: Tori's Window
              - entity: binary_sensor.bennett_window
                name: Bennett's Window
              - entity: binary_sensor.back_window
                name: Kitchen Window
              - entity: binary_sensor.mailbox_sensor
                name: Mailbox
                icon: mdi:mailbox
          - type: entities
            title: Water Leak Detection
            state_color: true
            entities:
              - entity: binary_sensor.lumi_lumi_sensor_wleak_aq1_2
                name: Water Heater
                icon: mdi:water-alert
              - entity: binary_sensor.lumi_lumi_sensor_wleak_aq1_3
                name: Laundry Room
                icon: mdi:water-alert

      # --- Routines ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#routines"
            name: Routines & Automations
            icon: mdi:robot
          - type: entities
            title: Quick Routines
            entities:
              - entity: script.goodnight_routine
                name: Goodnight
                icon: mdi:weather-night
              - entity: script.leaving_home_routine
                name: Leaving Home
                icon: mdi:exit-run
              - entity: script.dinner_mode
                name: Dinner Mode
                icon: mdi:food-variant
              - entity: script.cleaning_mode
                name: Cleaning Mode
                icon: mdi:broom
          - type: entities
            title: Motion Lighting
            show_header_toggle: true
            state_color: true
            entities:
              - automation.kitchen_motion_lights
              - automation.office_motion_lights
              - automation.living_room_motion_lights
          - type: entities
            title: Daily Routines
            show_header_toggle: true
            state_color: true
            entities:
              - automation.morning_sunrise_routine
              - automation.evening_sunset_routine
              - automation.nighttime_dimming_at_10_pm

      # --- System ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#system"
            name: System
            icon: mdi:cog
          - type: entities
            title: Notifications
            state_color: true
            entities:
              - entity: input_boolean.notification_system_enabled
                name: Notifications Enabled
                icon: mdi:bell
              - entity: input_boolean.daily_reports_enabled
                name: Daily Reports
              - entity: input_boolean.emergency_alerts_enabled
                name: Emergency Alerts
                icon: mdi:alert
          - type: entities
            title: Automation Controls
            state_color: true
            entities:
              - entity: input_boolean.motion_lighting_enabled
                name: Motion Lighting
                icon: mdi:lightbulb-auto
              - entity: input_boolean.climate_automation_enabled
                name: Climate Automation
                icon: mdi:thermostat-auto
              - entity: input_boolean.maintenance_mode
                name: Maintenance Mode
                icon: mdi:wrench
          - type: horizontal-stack
            cards:
              - type: button
                name: Dune Theme
                icon: mdi:palette
                tap_action:
                  action: call-service
                  service: frontend.set_theme
                  data:
                    name: dune_theme
              - type: button
                name: Default Theme
                icon: mdi:palette-outline
                tap_action:
                  action: call-service
                  service: frontend.set_theme
                  data:
                    name: default
          - type: button
            name: Battery Status
            icon: mdi:battery-heart
            tap_action:
              action: navigate
              navigation_path: "#batteries"

      # --- Modes ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#modes"
            name: Modes
            icon: mdi:tune
          - type: entities
            title: Rest & Comfort
            state_color: true
            entities:
              - entity: input_boolean.nap_mode
                name: Nap Mode
                icon: mdi:sleep
              - entity: input_boolean.reading_mode_living_room
                name: Reading — Living Room
                icon: mdi:book-open-variant
              - entity: input_boolean.reading_mode_bedroom
                name: Reading — Bedroom
                icon: mdi:book-open-page-variant
          - type: entities
            title: Activity
            state_color: true
            entities:
              - entity: input_boolean.cooking_mode
                name: Cooking Mode
                icon: mdi:chef-hat
              - entity: input_boolean.movie_mode
                name: Movie Mode
                icon: mdi:television-play
          - type: horizontal-stack
            cards:
              - type: button
                name: Dinner
                icon: mdi:food-variant
                tap_action:
                  action: call-service
                  service: script.dinner_mode
              - type: button
                name: Cleaning
                icon: mdi:broom
                tap_action:
                  action: call-service
                  service: script.cleaning_mode
          - type: entities
            title: Work & Focus
            state_color: true
            entities:
              - entity: input_boolean.focus_mode
                name: Focus Mode
                icon: mdi:brain
              - entity: input_boolean.do_not_disturb
                name: Do Not Disturb
                icon: mdi:bell-off
          - type: entities
            title: Social
            state_color: true
            entities:
              - entity: input_boolean.party_mode
                name: Party Mode
                icon: mdi:party-popper
              - entity: input_boolean.guest_mode
                name: Guest Mode
                icon: mdi:account-group
          - type: entities
            title: Home State
            state_color: true
            entities:
              - entity: input_boolean.vacation_mode
                name: Vacation Mode
                icon: mdi:airplane
              - entity: input_boolean.storm_mode
                name: Storm Mode
                icon: mdi:weather-lightning

      # --- Shades ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#shades"
            name: Roller Shades
            icon: mdi:blinds
          - type: horizontal-stack
            cards:
              - type: button
                name: Open All
                icon: mdi:blinds-open
                tap_action:
                  action: call-service
                  service: cover.open_cover
                  target:
                    entity_id:
                      - cover.living_room_left_roller_shade_cover
                      - cover.right_living_room_roller_shade_cover
                      - cover.office_left_roller_shade_cover
                      - cover.office_right_roller_shade_cover
              - type: button
                name: Close All
                icon: mdi:blinds
                tap_action:
                  action: call-service
                  service: cover.close_cover
                  target:
                    entity_id:
                      - cover.living_room_left_roller_shade_cover
                      - cover.right_living_room_roller_shade_cover
                      - cover.office_left_roller_shade_cover
                      - cover.office_right_roller_shade_cover
                      - cover.tori_roller_shade_cover
                      - cover.bennett_roller_shade_cover
          - type: entities
            title: Living Room
            entities:
              - entity: cover.living_room_left_roller_shade_cover
                name: Left
              - entity: cover.right_living_room_roller_shade_cover
                name: Right
          - type: entities
            title: Office
            entities:
              - entity: cover.office_left_roller_shade_cover
                name: Left
              - entity: cover.office_right_roller_shade_cover
                name: Right
          - type: entities
            title: Bedroom
            entities:
              - entity: cover.tori_roller_shade_cover
                name: Tori
              - entity: cover.bennett_roller_shade_cover
                name: Bennett

      # --- Batteries ---
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#batteries"
            name: Battery Status
            icon: mdi:battery-heart
          - type: entities
            title: Ring Alarm System
            state_color: true
            entities:
              - entity: sensor.base_station_battery
                name: Base Station
              - entity: sensor.keypad_battery
                name: Keypad
              - entity: sensor.front_door_battery
                name: Front Door Sensor
              - entity: sensor.back_door_battery
                name: Back Door Sensor
          - type: entities
            title: Window Sensors
            state_color: true
            entities:
              - entity: sensor.back_window_battery
                name: Kitchen Back Window
              - entity: sensor.left_window_battery
                name: Office Left Window
              - entity: sensor.right_window_battery
                name: Office Right Window
              - entity: sensor.left_window_battery_2
                name: Living Room Left Window
              - entity: sensor.right_window_battery_2
                name: Living Room Right Window
              - entity: sensor.tori_window_battery
                name: Tori Bedroom Window
              - entity: sensor.bennett_window_battery
                name: Bennett Bedroom Window
              - entity: sensor.window_battery
                name: Atlas Room Window
              - entity: sensor.mailbox_sensor_battery
                name: Mailbox Sensor
          - type: entities
            title: Motion Sensors
            state_color: true
            entities:
              - entity: sensor.kitchen_battery
                name: Kitchen
              - entity: sensor.bedroom_battery
                name: Bedroom
              - entity: sensor.living_room_motion_sensor_battery
                name: Living Room
