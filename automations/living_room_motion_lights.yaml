- id: living_room_motion_lights
  alias: Living Room Motion Lights
  description: >
    After sunset to 10:30 PM: full lights + switches.
    Cloudy/dark daytime: full lights + switches.
    Clear daytime, late night: disabled.

  trigger:
    - platform: state
      entity_id: binary_sensor.living_room_motion
      to: 'on'

  condition:
    - condition: time
      after: "05:00:00"
      before: "22:30:00"
    - condition: state
      entity_id: input_boolean.nap_mode
      state: 'off'
    - condition: state
      entity_id: input_boolean.reading_mode_living_room
      state: 'off'
    - condition: state
      entity_id: input_boolean.movie_mode
      state: 'off'
    - condition: state
      entity_id: input_boolean.party_mode
      state: 'off'

  action:
    - choose:
        # After sunset and before 10:30 PM: Full lights + switches
        - conditions:
            - condition: sun
              after: sunset
          sequence:
            - service: light.turn_on
              target:
                area_id: living_room
              data:
                brightness_pct: 100
            - service: switch.turn_on
              target:
                entity_id:
                  - switch.tp_link_power_strip_173b_couch_lamp
                  - switch.tp_link_power_strip_1446_lamp_by_door

        # Daytime but dark (lux below 50): Full lights + switches
        - conditions:
            - condition: numeric_state
              entity_id: sensor.living_room_motion_sensor_illuminance
              below: 50
          sequence:
            - service: light.turn_on
              target:
                area_id: living_room
              data:
                brightness_pct: 100
            - service: switch.turn_on
              target:
                entity_id:
                  - switch.tp_link_power_strip_173b_couch_lamp
                  - switch.tp_link_power_strip_1446_lamp_by_door

      # Default (clear daytime): Don't turn on
      default: []

  mode: restart

- id: living_room_motion_lights_off
  alias: Living Room Motion Lights Off
  description: Turn off living room lights 10 minutes after no motion

  trigger:
    - platform: state
      entity_id: binary_sensor.living_room_motion
      to: 'off'
      for:
        minutes: 10

  condition:
    - condition: or
      conditions:
        - condition: and
          conditions:
            - condition: state
              entity_id: person.tori_myers
              state: 'not_home'
            - condition: state
              entity_id: person.bennett
              state: 'not_home'
        - condition: sun
          before: sunset
        - condition: time
          after: "22:00:00"
    - condition: state
      entity_id: input_boolean.nap_mode
      state: 'off'
    - condition: state
      entity_id: input_boolean.reading_mode_living_room
      state: 'off'
    - condition: state
      entity_id: input_boolean.movie_mode
      state: 'off'
    - condition: state
      entity_id: input_boolean.party_mode
      state: 'off'

  action:
    # Guest mode: wait an extra 20 min (total 30 min) before turning off
    - if:
        - condition: state
          entity_id: input_boolean.guest_mode
          state: 'on'
      then:
        - delay:
            minutes: 20
    - service: light.turn_off
      target:
        area_id: living_room
    - service: switch.turn_off
      target:
        entity_id:
          - switch.tp_link_power_strip_173b_couch_lamp
          - switch.tp_link_power_strip_1446_lamp_by_door

  mode: restart
