- id: pause_appliance_notifications_during_sleep
  alias: Pause Appliance Notifications During Sleep Time
  description: Don't send washer/dryer notifications between midnight and 6 AM

  trigger:
    - platform: state
      entity_id:
        - input_boolean.washer_cycle_active
        - input_boolean.dryer_cycle_active
      from: 'on'
      to: 'off'

  condition:
    - condition: time
      after: "00:00:00"
      before: "06:00:00"

  action:
    # Don't send notification, just log it
    - service: logbook.log
      data:
        name: "Appliance Cycle Complete (Silent)"
        message: >
          {{ trigger.to_state.attributes.friendly_name }} completed during sleep hours. Notification suppressed.

  mode: queued
  max: 2


- id: welcome_home_lights_daytime
  alias: Welcome Home Lights - Daytime
  description: Turn on lights when arriving home during daytime if it's cloudy

  trigger:
    - platform: state
      entity_id:
        - person.tori_myers
        - person.bennett
      to: 'home'

  condition:
    # Only during daytime
    - condition: sun
      after: sunrise
      before: sunset
    # Only if cloudy/rainy
    - condition: or
      conditions:
        - condition: state
          entity_id: weather.forecast_home
          state: 'cloudy'
        - condition: state
          entity_id: weather.forecast_home
          state: 'rainy'

  action:
    - service: light.turn_on
      target:
        area_id:
          - living_room
          - kitchen
      data:
        brightness_pct: 75

  mode: restart

- id: auto_close_shades_hot_day
  alias: Auto-Close Shades on Hot Sunny Days
  description: Automatically close all shades at noon when it's sunny to reduce AC load

  trigger:
    - platform: time
      at: "12:00:00"

  condition:
    - condition: state
      entity_id: weather.forecast_home
      state: 'sunny'

  action:
    - service: cover.set_cover_position
      target:
        entity_id:
          - cover.living_room_left_roller_shade_cover
          - cover.right_living_room_roller_shade_cover
          - cover.office_left_roller_shade_cover
          - cover.office_right_roller_shade_cover
      data:
        position: 50
    - service: script.notify_household
      data:
        title: "☀️ Shades Half-Closed"
        message: "Sunny day — shades at 50% to keep the house cool and let in light."

  mode: single

# auto_close_shades_on_departure removed — shades stay open when away for plant light

- id: close_all_shades_action
  alias: Close All Shades - Notification Action
  description: Close all shades when notification action is tapped

  trigger:
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: "CLOSE_ALL_SHADES"

  action:
    - service: cover.close_cover
      target:
        entity_id:
          - cover.living_room_left_roller_shade_cover
          - cover.right_living_room_roller_shade_cover
          - cover.office_left_roller_shade_cover
          - cover.office_right_roller_shade_cover
          - cover.tori_roller_shade_cover
          - cover.bennett_roller_shade_cover

    - service: notify.mobile_app_tori_pixel_10_pro_xl
      data:
        title: "🪟 Shades Closed"
        message: "All shades closed to keep the house cool!"
    - service: notify.mobile_app_pixel_10
      data:
        title: "🪟 Shades Closed"
        message: "All shades closed to keep the house cool!"

  mode: single
