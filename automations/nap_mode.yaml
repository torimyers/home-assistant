- id: nap_mode_activate
  alias: Nap Mode - Activate
  description: Turn off living room lights and close shades when nap mode enabled

  trigger:
    - platform: state
      entity_id: input_boolean.nap_mode
      to: 'on'

  action:
    - service: light.turn_off
      target:
        area_id: living_room
    - service: switch.turn_off
      target:
        entity_id:
          - switch.tp_link_power_strip_173b_couch_lamp
          - switch.tp_link_power_strip_1446_lamp_by_door
    - service: cover.close_cover
      target:
        entity_id:
          - cover.living_room_left_roller_shade_cover
          - cover.right_living_room_roller_shade_cover

  mode: single

- id: nap_mode_deactivate
  alias: Nap Mode - Deactivate
  description: Reopen living room shades when nap mode turned off (daytime only)

  trigger:
    - platform: state
      entity_id: input_boolean.nap_mode
      to: 'off'

  action:
    - choose:
        - conditions:
            - condition: sun
              after: sunrise
              before: sunset
          sequence:
            - service: cover.open_cover
              target:
                entity_id:
                  - cover.living_room_left_roller_shade_cover
                  - cover.right_living_room_roller_shade_cover
      default: []

  mode: single
