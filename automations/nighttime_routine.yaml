- id: nighttime_dimming_10pm
  alias: Nighttime Dimming at 10 PM
  description: Dim office and kitchen lights, turn off dining room at 10 PM

  trigger:
    - platform: time
      at: "22:00:00"

  condition:
    - condition: state
      entity_id: input_boolean.party_mode
      state: 'off'

  action:
    # Dim office lights to 30%
    - service: light.turn_on
      target:
        area_id: office
      data:
        brightness_pct: 30

    # Dim kitchen lights to 30%
    - service: light.turn_on
      target:
        area_id: kitchen
      data:
        brightness_pct: 30

    # Turn off all 4 dining room table lights
    - service: light.turn_off
      target:
        entity_id:
          - light.dining_room_table_light_1
          - light.dining_room_table_light_2
          - light.ikea_of_sweden_tradfribulbe12wscandleopal450lm_light_3
          - light.ikea_of_sweden_tradfribulbe12wscandleopal450lm_light_4

    # Turn off living room lamp switches
    - service: switch.turn_off
      target:
        entity_id:
          - switch.tp_link_power_strip_173b_couch_lamp
          - switch.tp_link_power_strip_1446_lamp_by_door

  mode: single

- id: bedroom_lamp_off_when_charging
  alias: Bedroom Lamp Off When Charging
  description: Turn off bedroom lamp when phone plugged in and home

  trigger:
    - platform: state
      entity_id: binary_sensor.tori_pixel_10_pro_xl_is_charging
      to: 'on'

  condition:
    - condition: state
      entity_id: person.tori_myers
      state: 'home'
    - condition: state
      entity_id: input_boolean.reading_mode_bedroom
      state: 'off'

  action:
    - service: light.turn_off
      target:
        entity_id: light.bedroom_tori_light

  mode: single

- id: turn_off_everything_10pm_away
  alias: Turn Off Everything at 10 PM if Nobody Home
  description: Turn off all lights at 10 PM if both people are away (except security lights)

  trigger:
    - platform: time
      at: "22:00:00"

  condition:
    - condition: and
      conditions:
        - condition: state
          entity_id: person.tori_myers
          state: 'not_home'
        - condition: state
          entity_id: person.bennett
          state: 'not_home'

  action:
    # Turn off indoor lights (excluding security lights)
    - service: light.turn_off
      target:
        entity_id:
          - light.kitchen_over_oven
          - light.kitchen_over_sink
          - light.dining_room_table_light_1
          - light.dining_room_table_light_2
          - light.ikea_of_sweden_tradfribulbe12wscandleopal450lm_light_3
          - light.ikea_of_sweden_tradfribulbe12wscandleopal450lm_light_4
          - light.ledvance_a19_rgbw_light
          - light.ledvance_a19_rgbw_light_2
          - light.ledvance_a19_rgbw_light_3
          - light.bedroom_tori_light
    # Turn off living room switches
    - service: switch.turn_off
      target:
        entity_id:
          - switch.tp_link_power_strip_173b_couch_lamp
          - switch.tp_link_power_strip_1446_lamp_by_door
    # Ensure security lights stay ON for safety
    - service: light.turn_on
      target:
        entity_id:
          - light.front_770e
          - light.backyard_f84a

  mode: single

- id: welcome_home_after_10pm
  alias: Welcome Home After 10 PM
  description: >
    Turn on living room + kitchen when arriving after 10 PM.
    Bedroom only if nobody else was already home.
    Auto-off after 20 min of no living room motion (max 2 hours).
    Bedroom left to phone-charging automation.

  trigger:
    - platform: state
      entity_id:
        - person.tori_myers
        - person.bennett
      to: 'home'

  condition:
    - condition: time
      after: "22:00:00"
      before: "05:00:00"

  action:
    # Always turn on living room and kitchen
    - service: light.turn_on
      target:
        area_id: living_room
      data:
        brightness_pct: 100
    - service: switch.turn_on
      target:
        entity_id:
          - switch.tp_link_power_strip_173b_couch_lamp
          - switch.tp_link_power_strip_1446_lamp_by_door
    - service: light.turn_on
      target:
        area_id: kitchen
      data:
        brightness_pct: 100

    # Bedroom only if the other person wasn't already home
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {% if trigger.entity_id == 'person.tori_myers' %}
                  {{ is_state('person.bennett', 'home') }}
                {% elif trigger.entity_id == 'person.bennett' %}
                  {{ is_state('person.tori_myers', 'home') }}
                {% else %}
                  false
                {% endif %}
          sequence: []
      default:
        - service: light.turn_on
          target:
            area_id: bedroom
          data:
            brightness_pct: 100

    # Wait for living room to go quiet — 20 min of no motion, or 2 hours max
    - wait_for_trigger:
        - platform: state
          entity_id: binary_sensor.living_room_motion
          to: 'off'
          for:
            minutes: 20
      timeout:
        hours: 2
      continue_on_timeout: true

    # Turn off living room + kitchen; bedroom handled by phone-charging automation
    - service: light.turn_off
      target:
        area_id:
          - living_room
          - kitchen
    - service: switch.turn_off
      target:
        entity_id:
          - switch.tp_link_power_strip_173b_couch_lamp
          - switch.tp_link_power_strip_1446_lamp_by_door

  mode: restart
