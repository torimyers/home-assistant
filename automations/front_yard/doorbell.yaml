# Ring Video Doorbell automations
# Entities (current): event.front_door_4ae9 (doorbell press), binary_sensor.front_door_4ae9 (motion), camera.front_door_4ae9
# Note: modern Ring integration exposes button presses as an `event` entity whose state is the
# timestamp of the last press; trigger on any state change of that entity.

- id: doorbell_ring_notification
  alias: Doorbell - Ring Notification with Snapshot
  description: Notify both phones with a camera snapshot when doorbell is pressed

  trigger:
    - platform: state
      entity_id: event.front_door_4ae9
      not_to:
        - unavailable
        - unknown

  action:
    - service: camera.snapshot
      target:
        entity_id: camera.front_door_4ae9
      data:
        filename: /tmp/doorbell_snapshot.jpg

    - service: notify.mobile_app_tori_pixel_10_pro_xl
      data:
        title: "🔔 Doorbell"
        message: "Someone is at the front door."
        data:
          image: /tmp/doorbell_snapshot.jpg
          tag: doorbell
          importance: high
          ttl: 0
          actions:
            - action: "URI"
              title: "View Camera"
              uri: /lovelace/home

    - service: notify.mobile_app_pixel_10
      data:
        title: "🔔 Doorbell"
        message: "Someone is at the front door."
        data:
          image: /tmp/doorbell_snapshot.jpg
          tag: doorbell
          importance: high
          ttl: 0
          actions:
            - action: "URI"
              title: "View Camera"
              uri: /lovelace/home

  mode: single

- id: front_door_package_delivery
  alias: Front Door - Possible Package Delivery
  description: >
    Notify when motion detected at front door during delivery hours
    (weekdays 8 AM - 8 PM) but no doorbell ring.
    Suppressed if someone is home (you'll see it yourself).

  trigger:
    - platform: state
      entity_id: binary_sensor.front_door_4ae9
      to: 'on'

  condition:
    # Delivery hours: weekdays 8 AM - 8 PM
    - condition: time
      after: "08:00:00"
      before: "20:00:00"
    - condition: time
      weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
    # Nobody home — if you're home you'll see it yourself
    - condition: state
      entity_id: person.tori_myers
      state: 'not_home'
    - condition: state
      entity_id: person.bennett
      state: 'not_home'
    # Doorbell wasn't just rung in the last 30s (that has its own notification)
    - condition: template
      value_template: >
        {{ (now() - states.event.front_door_4ae9.last_changed).total_seconds() > 30 }}

  action:
    - service: camera.snapshot
      target:
        entity_id: camera.front_door_4ae9
      data:
        filename: /tmp/front_door_snapshot.jpg

    - service: notify.mobile_app_tori_pixel_10_pro_xl
      data:
        title: "📦 Motion at Front Door"
        message: "Someone at the front door — possible delivery."
        data:
          image: /tmp/front_door_snapshot.jpg
          tag: front_door_motion
          actions:
            - action: "URI"
              title: "View Camera"
              uri: /lovelace/home

    - service: notify.mobile_app_pixel_10
      data:
        title: "📦 Motion at Front Door"
        message: "Someone at the front door — possible delivery."
        data:
          image: /tmp/front_door_snapshot.jpg
          tag: front_door_motion
          actions:
            - action: "URI"
              title: "View Camera"
              uri: /lovelace/home

  mode: single
