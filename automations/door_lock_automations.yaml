- id: auto_lock_front_door
  alias: Auto-Lock Front Door After 5 Minutes
  description: Automatically lock front door 5 minutes after being unlocked

  trigger:
    - platform: state
      entity_id: lock.front_door
      to: 'unlocked'
      for:
        minutes: 5

  condition:
    - condition: state
      entity_id: input_boolean.guest_mode
      state: 'off'

  action:
    - service: lock.lock
      target:
        entity_id: lock.front_door

  mode: restart

- id: auto_lock_back_door
  alias: Auto-Lock Back Door After 5 Minutes
  description: Automatically lock back door 5 minutes after being unlocked

  trigger:
    - platform: state
      entity_id: lock.back_door
      to: 'unlocked'
      for:
        minutes: 5

  condition:
    - condition: state
      entity_id: input_boolean.guest_mode
      state: 'off'

  action:
    - service: lock.lock
      target:
        entity_id: lock.back_door

  mode: restart

- id: lock_doors_on_departure
  alias: Lock All Doors When Everyone Leaves
  description: Lock both doors when no one is home

  trigger:
    - platform: state
      entity_id:
        - person.tori_myers
        - person.bennett
      to: 'not_home'

  condition:
    - condition: state
      entity_id: person.tori_myers
      state: 'not_home'
    - condition: state
      entity_id: person.bennett
      state: 'not_home'

  action:
    - service: lock.lock
      target:
        entity_id:
          - lock.front_door
          - lock.back_door

    - service: notify.mobile_app_tori_pixel_10_pro_xl
      data:
        title: "🔒 House Secured"
        message: "All doors locked — everyone has left."
    - service: notify.mobile_app_pixel_10
      data:
        title: "🔒 House Secured"
        message: "All doors locked — everyone has left."

  mode: single

- id: notify_back_door_unlocked
  alias: Notify When Back Door Unlocked
  description: Send alert when back door is unlocked (unexpected access)

  trigger:
    - platform: state
      entity_id: lock.back_door
      to: 'unlocked'

  action:
    - service: notify.mobile_app_tori_pixel_10_pro_xl
      data:
        title: "🚪 Back Door Unlocked"
        message: "The back door was unlocked at {{ now().strftime('%I:%M %p') }}."
        data:
          priority: high
          actions:
            - action: "LOCK_ALL_DOORS"
              title: "Lock All Doors"
    - service: notify.mobile_app_pixel_10
      data:
        title: "🚪 Back Door Unlocked"
        message: "The back door was unlocked at {{ now().strftime('%I:%M %p') }}."
        data:
          priority: high
          actions:
            - action: "LOCK_ALL_DOORS"
              title: "Lock All Doors"

  mode: single

- id: auto_unlock_arriving_home
  alias: Auto-Unlock Front Door When Arriving Home
  description: Unlock front door when Tori or Bennett arrives home

  trigger:
    - platform: state
      entity_id:
        - person.tori_myers
        - person.bennett
      to: 'home'

  action:
    - service: lock.unlock
      target:
        entity_id: lock.front_door

  mode: single

- id: announce_arrival_home
  alias: Announce When Someone Arrives Home
  description: Announce "X is home" on speakers when arriving, only if someone else is already home

  trigger:
    - platform: state
      entity_id:
        - person.tori_myers
        - person.bennett
      to: 'home'

  condition:
    # Only announce if someone else is already home to hear it
    - condition: template
      value_template: >
        {% if trigger.entity_id == 'person.tori_myers' %}
          {{ is_state('person.bennett', 'home') }}
        {% elif trigger.entity_id == 'person.bennett' %}
          {{ is_state('person.tori_myers', 'home') }}
        {% else %}
          false
        {% endif %}
    - condition: state
      entity_id: input_boolean.nap_mode
      state: 'off'
    - condition: state
      entity_id: input_boolean.do_not_disturb
      state: 'off'
    - condition: state
      entity_id: input_boolean.focus_mode
      state: 'off'

  action:
    # Announce on all media players
    - service: tts.google_translate_say
      target:
        entity_id:
          - media_player.bedroom
          - media_player.office
      data:
        message: >
          {% if trigger.entity_id == 'person.tori_myers' %}
            Tori is home
          {% elif trigger.entity_id == 'person.bennett' %}
            Bennett is home
          {% else %}
            Someone is home
          {% endif %}

  mode: single
