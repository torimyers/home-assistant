- id: kitchen_motion_lights
  alias: Kitchen Motion Lights
  description: >
    After sunset to 10 PM: full brightness. 10 PM-12 AM: 30%.
    12 AM-5 AM: sink only at 10%. Daytime: only if living room lux below 50.

  trigger:
    - platform: state
      entity_id: binary_sensor.kitchen_motion
      to: 'on'

  condition:
    - condition: state
      entity_id: input_boolean.party_mode
      state: 'off'

  action:
    - choose:
        # Sleep time (12 AM - 5 AM): Only sink light at 10%
        - conditions:
            - condition: time
              after: "00:00:00"
              before: "05:00:00"
          sequence:
            - service: light.turn_on
              target:
                entity_id: light.ikea_of_sweden_stoftmoln_ceiling_wall_lamp_ww10_light_2
              data:
                brightness_pct: 10

        # Late evening (10 PM - 12 AM): All lights dimmed to 30%
        - conditions:
            - condition: time
              after: "22:00:00"
              before: "23:59:59"
          sequence:
            - service: light.turn_on
              target:
                area_id: kitchen
              data:
                brightness_pct: 30

        # After sunset and before 10 PM: Full brightness
        - conditions:
            - condition: sun
              after: sunset
            - condition: time
              before: "22:00:00"
          sequence:
            - service: light.turn_on
              target:
                area_id: kitchen
              data:
                brightness_pct: 100

        # Daytime but dark (living room lux below 50): Full brightness
        - conditions:
            - condition: sun
              before: sunset
            - condition: numeric_state
              entity_id: sensor.living_room_motion_sensor_illuminance
              below: 50
          sequence:
            - service: light.turn_on
              target:
                area_id: kitchen
              data:
                brightness_pct: 100

      # Default (clear daytime): Don't turn on
      default: []

  mode: restart

- id: kitchen_motion_lights_off
  alias: Kitchen Motion Lights Off
  description: Turn off kitchen lights 10 minutes after no motion

  trigger:
    - platform: state
      entity_id: binary_sensor.kitchen_motion
      to: 'off'
      for:
        minutes: 10

  condition:
    - condition: state
      entity_id: input_boolean.cooking_mode
      state: 'off'
    - condition: state
      entity_id: input_boolean.party_mode
      state: 'off'

  action:
    - service: light.turn_off
      target:
        area_id: kitchen

  mode: restart
