- id: focus_mode_activate
  alias: Focus Mode - Activate
  description: Set office lights to optimal work brightness, suppress TTS and motion off

  trigger:
    - platform: state
      entity_id: input_boolean.focus_mode
      to: 'on'

  action:
    # Desk lamps only. The Hunter ceiling-fan light is also in the office area, and
    # overhead glare is the opposite of what focus mode is for. Same two entities
    # office_motion_lights and nighttime_dimming_10pm drive.
    - service: light.turn_on
      target:
        entity_id:
          - light.ledvance_a19_rgbw_light_2
          - light.ledvance_a19_rgbw_light_3
      data:
        brightness_pct: 100
        kelvin: 4000

  mode: single
