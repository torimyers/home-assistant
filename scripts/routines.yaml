---
# Routine Scripts for Quick Actions

goodnight_routine:
  alias: Goodnight Routine
  description: Execute bedtime routine - locks doors, turns off lights, arms alarm
  sequence:
    # Turn off all indoor lights and lamp switches
    - service: homeassistant.turn_off
      target:
        entity_id:
          - light.indoor_lights
          - switch.tp_link_power_strip_173b_couch_lamp
          - switch.tp_link_power_strip_1446_lamp_by_door

    # Keep floodlights on for security (managed by schedules)

    # Lock all doors
    - service: lock.lock
      target:
        entity_id:
          - lock.front_door
          - lock.back_door

    # Arm alarm in Home mode
    - service: alarm_control_panel.alarm_arm_home
      target:
        entity_id: alarm_control_panel.alarm

    # Send confirmation
    - service: notify.mobile_app_tori_pixel_10_pro_xl
      data:
        title: "🌙 Goodnight"
        message: "Lights off, doors locked, alarm armed. Sleep well!"
    - service: notify.mobile_app_pixel_10
      data:
        title: "🌙 Goodnight"
        message: "Lights off, doors locked, alarm armed. Sleep well!"
  mode: single

dinner_mode:
  alias: Dinner Mode
  description: Dining room warm and bright, living room ambient
  sequence:
    - service: light.turn_on
      target:
        entity_id:
          - light.dining_room_table_light_1
          - light.dining_room_table_light_2
          - light.ikea_of_sweden_tradfribulbe12wscandleopal450lm_light_3
          - light.ikea_of_sweden_tradfribulbe12wscandleopal450lm_light_4
      data:
        brightness_pct: 70
        kelvin: 2700
    - service: light.turn_on
      target:
        area_id: living_room
      data:
        brightness_pct: 50
        kelvin: 2700
    - service: switch.turn_on
      target:
        entity_id:
          - switch.tp_link_power_strip_173b_couch_lamp
          - switch.tp_link_power_strip_1446_lamp_by_door
  mode: single

cleaning_mode:
  alias: Cleaning Mode
  description: All lights at full brightness, all shades open
  sequence:
    - service: light.turn_on
      target:
        entity_id:
          - light.indoor_lights
      data:
        brightness_pct: 100
    - service: cover.open_cover
      target:
        entity_id:
          - cover.living_room_left_roller_shade_cover
          - cover.right_living_room_roller_shade_cover
          - cover.office_left_roller_shade_cover
          - cover.office_right_roller_shade_cover
  mode: single

leaving_home_routine:
  alias: Leaving Home Routine
  description: Secure home when leaving - locks doors, turns off lights/appliances, arms alarm
  sequence:
    # Turn off all indoor lights and lamp switches
    - service: homeassistant.turn_off
      target:
        entity_id:
          - light.indoor_lights
          - switch.tp_link_power_strip_173b_couch_lamp
          - switch.tp_link_power_strip_1446_lamp_by_door

    # Turn on floodlights for security, but only after dark. The floodlight_schedule
    # automations own these sunset->sunrise; an unconditional turn_on here left them
    # burning all day when leaving in the morning.
    # (below_horizon, not `condition: sun` after/before — that ANDs against *today's*
    # sunrise and so never evaluates true overnight.)
    - if:
        - condition: state
          entity_id: sun.sun
          state: 'below_horizon'
      then:
        - service: light.turn_on
          target:
            entity_id:
              - light.front_770e
              - light.backyard_f84a

    # Lock all doors
    - service: lock.lock
      target:
        entity_id:
          - lock.front_door
          - lock.back_door

    # Smart locks acknowledge the command, not the bolt. Wait for both to actually
    # report locked so the confirmation below can't claim a door that jammed.
    - wait_template: >-
        {{ is_state('lock.front_door', 'locked')
           and is_state('lock.back_door', 'locked') }}
      timeout:
        seconds: 30
      continue_on_timeout: true

    # Shades intentionally left open when away so the plants get light
    # (see auto_close_shades_on_departure note in automations/convenience.yaml)

    # Wait 30 seconds to allow time to leave
    - delay:
        seconds: 30

    # Arm alarm in Away mode. Still arms even if a door failed to lock — armed is
    # safer than unarmed — but the notification says so plainly.
    - service: alarm_control_panel.alarm_arm_away
      target:
        entity_id: alarm_control_panel.alarm

    # Anything not reporting 'locked' counts as unlocked — including an entity that
    # has gone missing, which states() renders as 'unknown'. Fails safe: a renamed
    # lock gets called out rather than silently passing as secured.
    - variables:
        unlocked_doors: >-
          {%- set doors = {'lock.front_door': 'Front Door',
                           'lock.back_door': 'Back Door'} -%}
          {%- set ns = namespace(unlocked=[]) -%}
          {%- for entity, label in doors.items() -%}
            {%- if states(entity) != 'locked' -%}
              {%- set ns.unlocked = ns.unlocked + [label] -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ns.unlocked | join(' and ') }}
    - variables:
        secure_title: >-
          {{ '🏠 Leaving Home' if unlocked_doors == ''
             else '⚠️ Leaving Home - Door Not Locked' }}
        secure_message: >-
          {% if unlocked_doors == '' -%}
            Home secured! Lights off, doors locked, alarm armed in Away mode.
          {%- else -%}
            {{ unlocked_doors }} did not lock! Alarm is armed in Away mode, but check the door.
          {%- endif %}

    # Send confirmation (always both phones — security notification)
    - service: notify.mobile_app_tori_pixel_10_pro_xl
      data:
        title: "{{ secure_title }}"
        message: "{{ secure_message }}"
    - service: notify.mobile_app_pixel_10
      data:
        title: "{{ secure_title }}"
        message: "{{ secure_message }}"
  # Dropping a duplicate run is intended — the script is unresponsive for ~30s and
  # re-running the lock/arm sequence buys nothing. silent keeps a double-tap or an
  # Alexa retry from logging a warning for expected behaviour.
  mode: single
  max_exceeded: silent
